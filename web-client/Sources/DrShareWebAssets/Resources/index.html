<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="description" content="Local-first drop lane for this Mac and nearby browser clients." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>drshare</title>
    <link rel="stylesheet" href="/app.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <div class="sticky-top">
        <header class="header">
          <div class="logo-area">
            <h1>drshare</h1>
            <div class="status-indicator" id="connection-indicator"></div>
          </div>
          <button id="show-info-btn" class="button-minimal" hidden>info</button>
        </header>

        <nav class="tabs">
          <button class="tab-btn active" data-target="view-text">Send Text</button>
          <button class="tab-btn" data-target="view-file">Send File</button>
          <button class="tab-btn" data-target="view-drops">Recent Drops</button>
        </nav>
      </div>

      <div id="info-modal" class="modal" hidden>
        <div class="modal-content">
          <div class="modal-header">
            <h2>connection info</h2>
            <button id="close-info-btn" class="icon-button"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
          </div>
          <div class="modal-body stack">
            <div>
              <span class="view-hint">URL</span>
              <p id="modal-url" class="info-text"></p>
            </div>
            <div>
              <span class="view-hint">Pairing Token</span>
              <p id="modal-token" class="info-text"></p>
            </div>
            <div>
              <span class="view-hint">Retention Policy</span>
              <p id="modal-retention" class="info-text"></p>
            </div>
          </div>
        </div>
      </div>

      <div id="pairing-section" class="panel pairing-panel" hidden>
        <form id="token-form" class="input-group">
          <input id="token-input" name="token" type="text" placeholder="Enter Pairing Token" autocomplete="off" spellcheck="false" />
          <button class="button primary" type="submit">Connect</button>
        </form>
      </div>

      <div class="view-container">
        <section id="transfer-panel" class="transfer-panel" hidden>
          <div class="transfer-header">
            <strong id="transfer-title">transferring</strong>
            <span id="transfer-percent" class="meta">0%</span>
          </div>
          <div class="transfer-bar">
            <div id="transfer-bar-fill" class="transfer-bar-fill"></div>
          </div>
          <p id="transfer-meta" class="view-hint">starting…</p>
        </section>

        <!-- SEND TEXT VIEW -->
        <section id="view-text" class="view-panel active">
          <form id="text-form" class="stack">
            <textarea id="text-input" name="text" placeholder="Type or paste a note..."></textarea>
            <div class="action-row">
              <span class="view-hint">Send a quick snippet to the host.</span>
              <button class="button primary" type="submit">Send</button>
            </div>
          </form>
        </section>

        <!-- SEND FILE VIEW -->
        <section id="view-file" class="view-panel">
          <form id="file-form" class="stack">
            <div class="upload-zone">
              <label for="file-input" class="file-label">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <span id="file-name-display">Click to select or drop a file</span>
              </label>
              <input id="file-input" name="file" type="file" />
            </div>
            <div class="action-row">
              <span id="file-hint" class="view-hint">Max size: Unknown</span>
              <button id="file-submit-button" class="button primary" type="submit">Upload</button>
            </div>
          </form>
        </section>

        <!-- RECENT DROPS VIEW -->
        <section id="view-drops" class="view-panel drops-panel">
          <div class="drops-header">
            <span class="view-hint">Latest activity</span>
            <button id="refresh-button" class="icon-button" type="button" title="Refresh">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>
          </div>
          <p id="feedback" class="feedback" aria-live="polite"></p>
          <ul id="drops-list" class="drops"></ul>
          <p id="empty-state" class="empty-state">No drops yet.</p>
        </section>
      </div>
    </main>
  </body>
</html>
